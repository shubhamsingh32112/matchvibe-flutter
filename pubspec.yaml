name: zztherapy
description: "Match Vibe - Flutter mobile app"
publish_to: 'none'

version: 1.0.0+35


environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.0.0
  
  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.2
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  just_audio: ^0.10.5
  
  # Local Notifications (for foreground/background chat notifications)
  flutter_local_notifications: ^18.0.1
  
  # HTTP Client
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^12.4.0
  
  # Video (login background)
  video_player: ^2.9.2

  # Animations
  flutter_animate: ^4.5.0
  
  # Skeletons
  skeletonizer: ^2.1.2
  
  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0

  # Cloudflare-Images pipeline (image_compress for EXIF stripping + HEIC->JPEG;
  # blurhash placeholders; connectivity awareness in AppNetworkImage).
  flutter_image_compress: ^2.3.0
  flutter_blurhash: ^0.8.2
  connectivity_plus: ^7.0.0
  
  # Phone Input (kept for backward compatibility if phone login is re-enabled)
  intl_phone_field: ^3.2.0
  
  # Stream Chat
  stream_chat_flutter: ^9.0.0
  
  # Stream Video
  stream_video_flutter: ^1.3.1
  stream_video: ^1.3.1
  stream_video_push_notification: ^1.3.1

  # Socket.IO (real-time creator availability)
  socket_io_client: ^3.0.2

  # Keep screen on during calls
  wakelock_plus: ^1.3.3

  # Wallet checkout flow
  url_launcher: ^6.3.1
  app_links: ^6.3.2

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  shared_preferences_android: 2.4.18

flutter:
  uses-material-design: true
  
  assets:
    - lib/assets/male/
    - lib/assets/female/
    - lib/assets/ringtone/
    - lib/assets/promo_first_call_on_us.png
    - lib/assets/addpopup-bg.jpeg
    - lib/assets/app_logo.png
    - lib/assets/wallet_icons/
    - lib/assets/call_ended_images/
    - lib/assets/loader_bg.png
    - lib/assets/loginpage_video.mp4
    - .env.development
    - .env.production

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "lib/assets/app_logo.png"