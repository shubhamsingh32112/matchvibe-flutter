name: zztherapy
description: "Match Vibe - Flutter mobile app"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.0.0
  
  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.10
  just_audio: ^0.10.5
  
  # Local Notifications (for foreground/background chat notifications)
  flutter_local_notifications: ^18.0.1
  
  # HTTP Client
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Animations
  flutter_animate: ^4.5.0
  
  # Skeletons
  skeletonizer: ^2.1.2
  
  # Utils
  intl: ^0.20.2
  equatable: ^2.0.5
  package_info_plus: ^8.0.0
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  
  # Phone Input (kept for backward compatibility if phone login is re-enabled)
  intl_phone_field: ^3.2.0
  
  # Stream Chat
  stream_chat_flutter: ^9.0.0
  
  # Stream Video
  stream_video_flutter: any
  stream_video: any
  stream_video_push_notification: any

  # Socket.IO (real-time creator availability)
  socket_io_client: ^3.0.2

  # Keep screen on during calls
  wakelock_plus: ^1.3.3

  # Wallet checkout flow
  url_launcher: ^6.3.1
  app_links: ^6.3.2

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  shared_preferences_android: 2.4.18

flutter:
  uses-material-design: true
  
  assets:
    - lib/assets/male/
    - lib/assets/female/
    - lib/assets/ringtone/
    - lib/assets/addpopup-bg.jpeg
    - lib/assets/gem.svg
    - lib/assets/app_icon.png
    - .env.development
    - .env.production

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "lib/assets/app_icon.png"